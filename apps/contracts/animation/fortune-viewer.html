<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://www.thegreatpropeth.com/favicon.ico">
<title>The Great Propeth</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  #container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  #container svg { width: 100%; height: 100%; display: block; }
  #error { color: #fff; font-family: monospace; padding: 2em; display: none; }
  #loader { color: #fff; font-family: monospace; font-size: 1.5em; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
</style>
</head>
<body>
<div id="container"></div>
<div id="loader">loading</div>
<div id="error"></div>
<script>
// Fortune Viewer — https://thegreatpropeth.com
(async function() {
  // Animate loader dots
  var loaderEl = document.getElementById('loader');
  var dots = 0;
  var loaderInterval = setInterval(function() {
    dots = (dots + 1) % 4;
    loaderEl.textContent = 'loading' + '.'.repeat(dots);
  }, 400);

  const CONTRACT = '0xcB7123C5cBfEE66d09B4e44fc9623fb1cf951364';
  const RPC_URLS = [
    'https://ethereum-rpc.publicnode.com',
    'https://eth.drpc.org'
  ];
  const IPFS_GATEWAY = 'https://propeth.4everland.link/ipfs/';

  function hideLoader() {
    clearInterval(loaderInterval);
    loaderEl.style.display = 'none';
  }

  function showError(msg) {
    hideLoader();
    var el = document.getElementById('error');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Get tokenId from query string
  var params = new URLSearchParams(window.location.search);
  var tokenId = params.get('id');
  if (tokenId === null) { showError('Missing ?id= parameter'); return; }
  tokenId = parseInt(tokenId, 10);
  if (isNaN(tokenId) || tokenId < 0) { showError('Invalid token ID'); return; }

  // ABI-encode a uint256
  function encodeUint256(n) {
    return n.toString(16).padStart(64, '0');
  }

  // Make an eth_call with RPC fallback
  async function ethCall(calldata) {
    var rpcBody = JSON.stringify({
      jsonrpc: '2.0', id: 1,
      method: 'eth_call',
      params: [{ to: CONTRACT, data: calldata }, 'latest']
    });
    for (var r = 0; r < RPC_URLS.length; r++) {
      try {
        var resp = await fetch(RPC_URLS[r], {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: rpcBody
        });
        var json = await resp.json();
        if (json.result && !json.error) return json.result;
      } catch(e) {}
    }
    throw new Error('All RPCs failed');
  }

  // Decode ABI-encoded string from hex result
  function decodeString(hex) {
    hex = hex.slice(2); // remove 0x
    var offset = parseInt(hex.slice(0, 64), 16) * 2;
    var len = parseInt(hex.slice(offset, offset + 64), 16) * 2;
    var strHex = hex.slice(offset + 64, offset + 64 + len);
    var str = '';
    for (var i = 0; i < strHex.length; i += 2) {
      str += String.fromCharCode(parseInt(strHex.slice(i, i + 2), 16));
    }
    return str;
  }

  // Decode 6 uint256 values from hex result
  function decodeUint256x6(hex) {
    hex = hex.slice(2);
    var vals = [];
    for (var i = 0; i < 6; i++) {
      vals.push(parseInt(hex.slice(i * 64, (i + 1) * 64), 16));
    }
    return vals;
  }

  // XML-escape text for safe SVG embedding
  function escapeXml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  try {
    // 1. Call fortuneData(tokenId) — selector 0x608e0271
    var fortuneResult = await ethCall('0x608e0271' + encodeUint256(tokenId));
    var vals = decodeUint256x6(fortuneResult);
    var card1 = vals[0], card2 = vals[1], card3 = vals[2];
    var variant1 = vals[3], variant2 = vals[4], variant3 = vals[5];

    // 2. Call fragmentTexts for each line, baseBgCID, fontURI in parallel
    var results = await Promise.all([
      // fragmentTexts(card1, 1, variant1) — selector 0x135bee20
      ethCall('0x135bee20' + encodeUint256(card1) + encodeUint256(1) + encodeUint256(variant1)),
      // fragmentTexts(card2, 2, variant2)
      ethCall('0x135bee20' + encodeUint256(card2) + encodeUint256(2) + encodeUint256(variant2)),
      // fragmentTexts(card3, 3, variant3)
      ethCall('0x135bee20' + encodeUint256(card3) + encodeUint256(3) + encodeUint256(variant3)),
      // baseBgCID() — selector 0x76973f0d
      ethCall('0x76973f0d'),
      // fontURI() — selector 0xbea489ef
      ethCall('0xbea489ef')
    ]);

    var text1 = decodeString(results[0]);
    var text2 = decodeString(results[1]);
    var text3 = decodeString(results[2]);
    var baseBgCID = decodeString(results[3]);
    var fontURI = decodeString(results[4]);

    // 3. Build SVG
    var fontFamily = fontURI ? 'Custom' : 'monospace';
    var fontDef = fontURI
      ? '<defs><style>@font-face{font-family:"Custom";src:url(' + escapeXml(fontURI) + ');}</style></defs>'
      : '';

    var svgStr = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet">'
      + fontDef
      + '<image href="' + IPFS_GATEWAY + baseBgCID + '" width="1920" height="1080"/>'
      + '<text x="960" y="430" text-anchor="middle" fill="#000" font-size="48" font-family="' + fontFamily + '">' + escapeXml(text1) + '</text>'
      + '<text x="960" y="580" text-anchor="middle" fill="#000" font-size="48" font-family="' + fontFamily + '">' + escapeXml(text2) + '</text>'
      + '<text x="960" y="730" text-anchor="middle" fill="#000" font-size="48" font-family="' + fontFamily + '">' + escapeXml(text3) + '</text>'
      + '</svg>';

    hideLoader();
    document.getElementById('container').innerHTML = svgStr;

  } catch(e) {
    showError('Error: ' + e.message);
  }
})();
</script>
</body>
</html>
